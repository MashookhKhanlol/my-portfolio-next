name: Deploy Portfolio

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    paths:
      - "next-portfolio/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

# ─────────────────────────────────────────────────────────────
# Required Repo Secrets (Settings → Secrets → Actions):
#
#   ── SSH / Server ──
#   HOST_IP            → VPS IP address         e.g. 203.0.113.10
#   HOST_NAME          → VPS hostname/domain    e.g. myserver.com
#   SSH_USER           → SSH login user         e.g. ubuntu / deploy
#   SSH_PRIVATE_KEY    → full contents of your private key
#
#   ── App secrets (written to .env.local on the VPS) ──
#   GMAIL_USER         → Gmail address used to send contact emails
#   GMAIL_APP_PASSWORD → 16-char Gmail App Password
#   NEXT_PUBLIC_DATA_URL → (optional) GitHub raw URL for data.json
# ─────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Pull & Rebuild on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            set -e   # exit immediately if any command fails

            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_DIR=~/websites/next-portfolio

            # ── 1. Clone on first run, pull on every run after ───────────
            echo "==> Syncing code from GitHub..."
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "    Repository exists — pulling latest changes..."
              cd "$DEPLOY_DIR"
              git pull origin master
            else
              echo "    Repository not found — cloning for the first time..."
              mkdir -p ~/websites
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # ── 2. Move into the app subdirectory ────────────────────────
            cd next-portfolio

            # ── 3. Write .env.local from GitHub secrets ───────────────────
            # This creates/overwrites the file on every deploy so secrets
            # stay up-to-date without manual VPS access.
            echo "==> Writing .env.local from GitHub secrets..."
            cat > .env.local <<'ENVEOF'
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            NEXT_PUBLIC_DATA_URL=${{ secrets.NEXT_PUBLIC_DATA_URL }}
            ENVEOF
            # Strip leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env.local
            echo "    .env.local written."

            # ── 4. Bring down the running container ──────────────────────
            echo "==> Stopping existing container..."
            docker compose down

            # ── 5. Remove the old image before building a fresh one ──────
            echo "==> Removing old portfolio image (if exists)..."
            docker rmi $(docker images -q 'next-portfolio-portfolio') 2>/dev/null || true
            # Also remove any dangling images left from previous builds
            docker image prune -f

            # ── 6. Build a clean image with no layer cache ────────────────
            #    .env.local is loaded automatically by docker-compose env_file
            echo "==> Building clean image (no cache) and starting container..."
            docker compose build --no-cache
            docker compose up -d

            # ── 7. Full post-build cleanup ────────────────────────────────
            echo "==> Running full Docker cleanup..."
            # Remove dangling images (untagged layers from old builds)
            docker image prune -f
            # Remove stopped containers
            docker container prune -f
            # Remove unused networks
            docker network prune -f
            # Remove dangling build cache
            docker builder prune -f

            echo "==> Done! Running containers:"
            docker ps
            echo ""
            echo "==> Disk usage after cleanup:"
            docker system df

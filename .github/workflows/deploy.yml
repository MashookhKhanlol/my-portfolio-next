name: Deploy Portfolio

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    paths:
      - "next-portfolio/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

# ─────────────────────────────────────────────────────────────
# Required Repo Secrets (Settings → Secrets → Actions):
#   HOST_IP         → VPS IP address         e.g. 203.0.113.10
#   HOST_NAME       → VPS hostname/domain    e.g. myserver.com
#   SSH_USER        → SSH login user         e.g. ubuntu / deploy
#   SSH_PRIVATE_KEY → contents of ~/.ssh/id_ed25519 (private key)
#
# NOTE: .env.local (GMAIL_USER, GMAIL_APP_PASSWORD) lives on the VPS.
#       Never put it in GitHub secrets. docker-compose picks it up via env_file.
#       Firebase has been removed — no Firebase secrets needed.
# ─────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Pull & Rebuild on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            set -e   # exit immediately if any command fails

            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_DIR=~/websites/next-portfolio

            # ── 1. Clone on first run, pull on every run after ───────────
            echo "==> Syncing code from GitHub..."
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "    Repository exists — pulling latest changes..."
              cd "$DEPLOY_DIR"
              git pull origin master
            else
              echo "    Repository not found — cloning for the first time..."
              mkdir -p ~/websites
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # ── 2. Move into the app subdirectory ────────────────────────
            cd next-portfolio

            # ── 3. Bring down the running container ──────────────────────
            echo "==> Stopping existing container..."
            docker compose down

            # ── 4. Remove the old image before building a fresh one ──────
            echo "==> Removing old portfolio image (if exists)..."
            docker rmi $(docker images -q 'next-portfolio-portfolio') 2>/dev/null || true
            # Also remove any dangling images left from previous builds
            docker image prune -f

            # ── 5. Build a clean image with no layer cache ────────────────
            #    .env.local on the VPS is used automatically (env_file)
            echo "==> Building clean image (no cache) and starting container..."
            docker compose build --no-cache
            docker compose up -d

            # ── 6. Full post-build cleanup ────────────────────────────────
            echo "==> Running full Docker cleanup..."
            # Remove dangling images (untagged layers from old builds)
            docker image prune -f
            # Remove stopped containers
            docker container prune -f
            # Remove unused networks
            docker network prune -f
            # Remove dangling build cache
            docker builder prune -f

            echo "==> Done! Running containers:"
            docker ps
            echo ""
            echo "==> Disk usage after cleanup:"
            docker system df

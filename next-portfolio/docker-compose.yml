services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ── Public vars (baked into the JS bundle at build time) ──────────────
        NEXT_PUBLIC_DATA_URL: ${NEXT_PUBLIC_DATA_URL}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
        NEXT_PUBLIC_FIREBASE_PROJECTID: ${NEXT_PUBLIC_FIREBASE_PROJECTID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDERID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDERID}
        NEXT_PUBLIC_FIREBASE_APPID: ${NEXT_PUBLIC_FIREBASE_APPID}
        NEXT_PUBLIC_FIREBASE_MEASUREMENTD: ${NEXT_PUBLIC_FIREBASE_MEASUREMENTD}
    image: next-portfolio:latest
    container_name: next-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Server-side only vars (never exposed to the browser) ─────────────
      NODE_ENV: production
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    # Load .env.local automatically for local development convenience
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
